# Local development stack: PostgreSQL + MinIO only. The Next.js app runs on the
# host with `npm run dev`. Start with: docker compose -f docker-compose.dev.yaml up -d
name: mepa-dev

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mepa
      POSTGRES_PASSWORD: mepa
      POSTGRES_DB: mepa
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - dev_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mepa -d mepa"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - dev_minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/mepa-media &&
      echo 'Bucket mepa-media ready';
      "

volumes:
  dev_postgres:
  dev_minio:
