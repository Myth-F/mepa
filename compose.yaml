# Production stack for Coolify. Coolify discovers the application through
# SERVICE_FQDN_APP_3000 and terminates TLS through its proxy. Credentials are
# generated and persisted by Coolify magic environment variables.
name: mepa

x-restart: &restart
  restart: unless-stopped

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    <<: [*restart, *logging]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-mepa}
      POSTGRES_PASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      POSTGRES_DB: ${POSTGRES_DB:-mepa}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mepa} -d ${POSTGRES_DB:-mepa}"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m

  minio:
    image: minio/minio:latest
    <<: [*restart, *logging]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${SERVICE_USER_MINIO}
      MINIO_ROOT_PASSWORD: ${SERVICE_PASSWORD_MINIO}
    volumes:
      - minio_data:/data
    networks:
      - backend
    # No host port mapping: MinIO is reachable only on the internal network.
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 512m

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    networks:
      - backend
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${SERVICE_USER_MINIO} ${SERVICE_PASSWORD_MINIO} &&
      mc mb --ignore-existing local/${S3_BUCKET:-mepa-media} &&
      mc anonymous set none local/${S3_BUCKET:-mepa-media} &&
      echo 'Bucket ${S3_BUCKET:-mepa-media} initialized';
      "
    restart: "no"

  # One-shot migration. The application starts only after it exits successfully.
  migrate:
    image: ${APP_IMAGE:-mepa-app}-migrate:${APP_TAG:-latest}
    build:
      context: .
      target: migrator
      args:
        NODE_VERSION: ${NODE_VERSION:-22.14.0-bookworm-slim}
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mepa}:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/${POSTGRES_DB:-mepa}
    networks:
      - backend
    command: ["npm", "run", "prisma:deploy"]
    restart: "no"

  app:
    image: ${APP_IMAGE:-mepa-app}:${APP_TAG:-latest}
    build:
      context: .
      args:
        NODE_VERSION: ${NODE_VERSION:-22.14.0-bookworm-slim}
    <<: [*restart, *logging]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-mepa}:${SERVICE_PASSWORD_POSTGRES}@postgres:5432/${POSTGRES_DB:-mepa}
      SESSION_TTL_HOURS: ${SESSION_TTL_HOURS:-168}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-mepa-media}
      S3_ACCESS_KEY_ID: ${SERVICE_USER_MINIO}
      S3_SECRET_ACCESS_KEY: ${SERVICE_PASSWORD_MINIO}
      S3_FORCE_PATH_STYLE: "true"
      TUTOR_ENABLED: "false"
      # Coolify creates the public URL and proxies it to container port 3000.
      SERVICE_FQDN_APP_3000: "/"
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 768m

  # Scheduled logical PostgreSQL dumps + MinIO mirror into the backup volume.
  backup:
    image: ${APP_IMAGE:-mepa-app}-backup:${APP_TAG:-latest}
    build:
      context: .
      target: backup
    <<: [*restart, *logging]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      PGUSER: ${POSTGRES_USER:-mepa}
      PGPASSWORD: ${SERVICE_PASSWORD_POSTGRES}
      PGDATABASE: ${POSTGRES_DB:-mepa}
      PGHOST: postgres
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: ${S3_BUCKET:-mepa-media}
      S3_ACCESS_KEY_ID: ${SERVICE_USER_MINIO}
      S3_SECRET_ACCESS_KEY: ${SERVICE_PASSWORD_MINIO}
    volumes:
      - backup_data:/backups
    networks:
      - backend
      - egress

networks:
  backend:
    internal: true
  # Allows the backup container to fetch the MinIO client on first start.
  egress:

volumes:
  postgres_data:
  minio_data:
  backup_data:
